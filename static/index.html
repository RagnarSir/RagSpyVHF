<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RagSpyVHF</title>
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>

  <!-- ── Fixed header ──────────────────────────────────────────── -->
  <header id="app-header">
    <span class="app-title">RagSpyVHF</span>
    <div id="device-status" class="status-badge idle">IDLE</div>

    <!-- Shown only while listening -->
    <div id="now-listening">
      <span id="nl-freq">—</span>
      <span id="nl-mode-badge" class="mode-badge">—</span>
      <div id="smeter" title="Signal strength">
        <span class="seg green"  data-seg="1"></span>
        <span class="seg green"  data-seg="2"></span>
        <span class="seg green"  data-seg="3"></span>
        <span class="seg green"  data-seg="4"></span>
        <span class="seg green"  data-seg="5"></span>
        <span class="seg yellow" data-seg="6"></span>
        <span class="seg red"    data-seg="7"></span>
      </div>
      <label class="ctrl-label">Vol
        <input type="range" id="volume-slider" min="0" max="2" step="0.05" value="1" />
      </label>
      <label class="ctrl-label">SQL
        <input type="range" id="squelch-slider" min="0" max="0.3" step="0.005" value="0.02" />
      </label>
      <button id="stop-btn">&#9632; Stop</button>
    </div>
  </header>

  <!-- ── Two-column body ──────────────────────────────────────── -->
  <div id="app-body">

    <!-- Left sidebar: controls -->
    <aside id="sidebar">

      <section class="sb-section">
        <span class="sb-label">Band</span>
        <select id="band-select"></select>
      </section>

      <section class="sb-section">
        <span class="sb-label">Mode</span>
        <div class="btn-group" id="mode-buttons">
          <button class="mode-btn active" data-mode="am">AM</button>
          <button class="mode-btn" data-mode="nfm">NFM</button>
          <button class="mode-btn" data-mode="usb">USB</button>
          <button class="mode-btn" data-mode="lsb">LSB</button>
        </div>
      </section>

      <section class="sb-section">
        <span class="sb-label">Frequency</span>
        <div class="freq-entry">
          <input type="text" id="freq-input" placeholder="27.185" />
          <span class="freq-unit">MHz</span>
        </div>
        <button id="freq-go-btn" class="go-btn">Tune</button>
      </section>

      <section class="sb-section">
        <span class="sb-label">Zoom</span>
        <div class="btn-group" id="zoom-buttons">
          <button class="zoom-btn active" data-zoom="1">1×</button>
          <button class="zoom-btn" data-zoom="2">2×</button>
          <button class="zoom-btn" data-zoom="4">4×</button>
          <button class="zoom-btn" data-zoom="8">8×</button>
        </div>
      </section>

      <section class="sb-section">
        <span class="sb-label">Palette</span>
        <div class="btn-group vertical" id="palette-buttons">
          <button class="palette-btn active" data-palette="heat">Heat</button>
          <button class="palette-btn" data-palette="grey">Greyscale</button>
          <button class="palette-btn" data-palette="rainbow">Rainbow</button>
        </div>
      </section>

    </aside>

    <!-- Right: spectrum display + signals table -->
    <main id="display-column">

      <!-- Canvas stack with overlay for unified mouse events -->
      <div class="canvas-stack" id="canvas-stack">
        <canvas id="ruler-canvas"    height="28"></canvas>
        <canvas id="spectrum-canvas" height="90"></canvas>
        <canvas id="waterfall-canvas" height="240"></canvas>
        <div id="canvas-overlay"></div>
      </div>

      <!-- Cursor info bar -->
      <div id="cursor-bar">
        <span id="cursor-freq">Hover over spectrum to read frequency</span>
        <span id="cursor-power"></span>
        <span id="cursor-hint">Click to tune · Drag to pan</span>
      </div>

      <!-- Signals table -->
      <div id="signals-panel">
        <h2 class="panel-title">Active Signals</h2>
        <table id="signals-table">
          <thead>
            <tr>
              <th>Frequency</th>
              <th>Type</th>
              <th>Name</th>
              <th>SNR&nbsp;dB</th>
              <th>Mode</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="signals-body">
            <tr id="signals-empty">
              <td colspan="6">Scanning…</td>
            </tr>
          </tbody>
        </table>
      </div>

    </main>
  </div><!-- #app-body -->

  <script src="/static/js/app.js"></script>
  <script src="/static/js/waterfall.js"></script>
  <script src="/static/js/signals.js"></script>
  <script src="/static/js/audio_player.js"></script>
</body>
</html>
